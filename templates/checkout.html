<!DOCTYPE html>
<html>
<head><meta charset="utf-8"><title>Checkout</title></head>
<style>
    body { font-family: "Times New Roman", serif; background: #f4f4f4; padding: 20px; }
    .checkout-container { display: flex; gap: 30px; max-width: 900px; margin: 0 auto; flex-wrap: wrap; }
    .billing, .summary { background: #fff; padding: 25px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); flex: 1; min-width: 300px; }
    h2 { margin-bottom: 20px; }
    form input, form select, form button { width: 100%; margin-bottom: 15px; padding: 10px; border-radius: 6px; border: 1px solid #ccc; }
    form button { background-color: #000; color: #fff; border: none; cursor: pointer; }
    form button:hover { background-color: #333; }
    .summary div { margin-bottom: 10px; font-size: 16px; }
</style>
<body>
  <div class="checkout-container">
    <div class="billing">
      <h2>Billing Details</h2>
      <form action="{% url 'process_payment' %}" method="POST">
        {% csrf_token %}
        <input type="text" name="name" value="{{ request.user.get_full_name }}" required>
        <input type="email" name="email" value="{{ request.user.email }}" required>
        <input type="text" name="phone" placeholder="980..." required>
        <input type="text" name="address" placeholder="Address" required>
        <input type="text" name="city" placeholder="City" required>
        <input type="text" name="country" value="Nepal" required>

        <select name="payment_type" id="paymentType" required>
          <option value="">--Select--</option>
          <option value="esewa">eSewa</option>
        </select>

        <input type="hidden" name="course_id" value="{{ course.id }}">
        <input type="hidden" name="course_name" value="{{ course.title }}">
        <input type="hidden" name="amount" value="{{ course.price }}">
        <input type="hidden" name="total_amount" value="{{ total_amount }}">

        <button type="submit">Proceed to Payment</button>
      </form>
    </div>

    <div class="summary">
      <h2>Order Summary</h2>
      <div>{{ course.title }} - Rs.{{ course.price }}</div>
      <div>Total - Rs.{{ total_amount }}</div>
    </div>
  </div>
</body>
</html>
