{% load static %}
<!DOCTYPE html>
<html>
<head>
  <title>Instructor Analytics</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    .body {
        font-family: "Times New Roman", serif;
        background: gray;
        color: #333;
    }
    .container {
        margin-top: 40px;
    }
    .card {
        border-radius: 12px;
        box-shadow: 0 4px 20px rgba(0,0,0,0.1);
        transition: transform 0.3s ease, box-shadow 0.3s ease;
    }
    .card:hover {
        transform: translateY(-5px);
        box-shadow: 0 8px 25px rgba(0,0,0,0.15);
    }
     .btn {
        background-color: black;
        color: white;
        border-radius: 10px;
        padding: 10px 20px;
        transition: all 0.3s ease;
    }
    .btn:hover {
        background-color: gray;
        color: black;
    }
  </style>
</head>

<body class="bg-light">

<div class="container py-5">
    <a href="{% url 'instructor_dashboard' %}" class="btn"><i class="fa-solid fa-arrow-left me-2"></i>Back to Dashboard</a>
  <h2 class="mb-4">📊 Revenue Analytics Dashboard</h2>

  <!-- Stats -->
  <div class="row mb-4">
    <div class="col-md-4">
      <div class="card p-3 shadow">
        <h5>Total Revenue</h5>
        <h3>Rs {{ total_revenue }}</h3>
      </div>
    </div>
  </div>

  <!-- Chart -->
  <div class="card p-4 shadow mb-4">
    <h5>📈 Course Enrollment / Sales</h5>
    <canvas id="revenueChart"></canvas>
  </div>

  <!-- Top Courses -->
  <div class="card p-4 shadow">
    <h5>🔥 Top Selling Courses</h5>
    <ul class="list-group mt-3">
      {% for c in top_courses %}
        <li class="list-group-item d-flex justify-content-between">
          {{ c.course__title }}
          <span class="badge bg-success">{{ c.students }} students</span>
        </li>
      {% endfor %}
    </ul>
  </div>

</div>

<script>
const ctx = document.getElementById('revenueChart');

new Chart(ctx, {
    type: 'bar',
    data: {
        labels: {{ chart_labels|safe }},
        datasets: [{
            label: 'Students Enrolled',
            data: {{ chart_values|safe }},
            backgroundColor: '#4e73df'
        }]
    },
    options: {
        responsive: true,
        plugins: {
            legend: { display: false }
        }
    }
});
</script>

</body>
</html>
